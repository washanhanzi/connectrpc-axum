name: Publish Crates

on:
  push:
    branches:
      - release
      - "release/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run cargo publish --dry-run instead of uploading
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-crates-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'washanhanzi/connectrpc-axum'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: crates-io
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set normal publish mode
        if: github.event_name != 'workflow_dispatch' || !inputs.dry_run
        run: echo "DRY_RUN_FLAG=" >> "$GITHUB_ENV"

      - name: Set dry-run mode
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: echo "DRY_RUN_FLAG=--dry-run" >> "$GITHUB_ENV"

      - name: Authenticate with crates.io
        id: auth
        if: env.DRY_RUN_FLAG == '' && env.CARGO_REGISTRY_TOKEN == ''
        uses: rust-lang/crates-io-auth-action@v1

      - name: Use Trusted Publishing token
        if: steps.auth.outputs.token != ''
        run: echo "CARGO_REGISTRY_TOKEN=${{ steps.auth.outputs.token }}" >> "$GITHUB_ENV"

      - name: Create idempotent publish helper
        run: |
          cat > /tmp/publish.sh <<'EOF'
          #!/bin/bash
          set -o pipefail
          crate="$1"; shift
          cargo publish -p "$crate" "$@" 2>&1 | tee /tmp/publish.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ] && grep -qE "already (exists|uploaded)" /tmp/publish.log; then
            echo "::notice::$crate already published at this version; skipping"
            exit 0
          fi
          exit "$status"
          EOF
          chmod +x /tmp/publish.sh

      - name: Publish connectrpc-axum-core
        run: /tmp/publish.sh connectrpc-axum-core $DRY_RUN_FLAG

      - name: Publish connectrpc-axum-build
        run: /tmp/publish.sh connectrpc-axum-build $DRY_RUN_FLAG

      - name: Publish connectrpc-axum-client
        run: /tmp/publish.sh connectrpc-axum-client $DRY_RUN_FLAG

      - name: Publish connectrpc-axum
        run: /tmp/publish.sh connectrpc-axum $DRY_RUN_FLAG
