syntax = "proto3";

package bench.v1;

option go_package = "github.com/washanhanzi/connectrpc-axum/benchmarks/connect-go/gen/bench/v1;benchv1";

service BenchService {
  rpc Unary(BenchRequest) returns (BenchResponse);
}

message BenchRequest {
  Payload payload = 1;
}

message BenchResponse {
  Payload payload = 1;
}

message Payload {
  int32 id = 1;
  int64 timestamp_nanos = 2;
  double latitude = 3;
  double longitude = 4;
  bool active = 5;
  fixed64 trace_id = 6;
  string name = 7;
  string description = 8;
  string region = 9;
  bytes data = 10;
  Status status = 11;
  Metadata metadata = 12;
  repeated int32 scores = 13;
  repeated string tags = 14;
  map<string, string> attributes = 15;
}

enum Status {
  STATUS_UNSPECIFIED = 0;
  STATUS_ACTIVE = 1;
  STATUS_INACTIVE = 2;
  STATUS_PENDING = 3;
}

message Metadata {
  string request_id = 1;
  string user_agent = 2;
  int64 created_at = 3;
  map<string, string> headers = 4;
}
